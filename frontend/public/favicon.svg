<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0f0a04"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c9a84c"/>
      <stop offset="40%"  stop-color="#f0d060"/>
      <stop offset="70%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6f2e"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Thin gold border -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#gold)" stroke-width="1"/>

  <!-- Stylised "A" glyph — two diagonal strokes + crossbar -->
  <!-- Left stroke -->
  <path d="M16 52 L32 14 L48 52" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar -->
  <line x1="22" y1="38" x2="42" y2="38" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Small diamond ornament above apex -->
  <path d="M32 9 L33.4 11.4 L32 13.8 L30.6 11.4 Z" fill="url(#gold)"/>
</svg>
